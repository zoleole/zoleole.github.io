<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z O L E O L E</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="192x192" href="favicon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@200;300;400;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --orange: #e8601c;
    --orange-bright: #ff6a1a;
    --orange-glow: #ff5500;
    --orange-pale: #ffb088;
    --dark: #0c0c0c;
    --darker: #060606;
    --gray-cross: #444;
    --white: #ddd;
    --white-dim: #999;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    background: #000;
    font-family: 'DM Mono', monospace;
  }

  .poster {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: var(--darker);
    overflow: hidden;
    cursor: crosshair;
  }

  /* === LOADING CURTAIN === */
  .loading-curtain {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1), visibility 1.2s;
  }
  .loading-curtain.hide {
    opacity: 0;
    visibility: hidden;
  }
  .loading-curtain .loader-ring {
    width: 40px;
    height: 40px;
    border: 1.5px solid transparent;
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: loaderSpin 1s linear infinite;
  }
  @keyframes loaderSpin { to { transform: rotate(360deg); } }

  /* === BG GRADIENT ATMOSPHERE === */
  .bg-atmosphere {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 70% 50% at 46% 48%, rgba(255,85,0,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 30% 80%, rgba(255,85,0,0.02) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 70% 20%, rgba(100,30,0,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  /* === CURSOR AURORA === */
  .cursor-glow {
    position: fixed;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(circle, rgba(255,85,0,0.04) 0%, rgba(255,85,0,0.015) 40%, transparent 70%);
    transform: translate(-50%, -50%);
    transition: opacity 0.5s;
    mix-blend-mode: screen;
    will-change: left, top;
  }

  /* === STARFIELD === */
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    opacity: 0;
    animation: starAppear 0.8s ease forwards;
  }
  .star.twinkle { animation: starAppear 0.8s ease forwards, twinkle 3s ease-in-out infinite; }

  @keyframes starAppear {
    from { opacity: 0; transform: scale(0); }
    to { opacity: var(--star-o, 0.4); transform: scale(1); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--star-o, 0.4); }
    50% { opacity: calc(var(--star-o, 0.4) * 0.2); }
  }

  /* === SHOOTING STARS === */
  .shooting-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    filter: blur(0.3px);
  }
  .shooting-star::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: var(--trail-len, 60px);
    height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.8), rgba(255,200,150,0.3), transparent);
    transform-origin: right center;
    transform: rotate(var(--trail-angle, 0deg));
  }

  @keyframes shootingStar {
    0% { opacity: 0; transform: translate(0, 0); }
    5% { opacity: 1; }
    70% { opacity: 0.6; }
    100% { opacity: 0; transform: translate(var(--shoot-dx), var(--shoot-dy)); }
  }

  /* === CONSTELLATION LINES === */
  .constellation-canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    animation: constFade 2s ease 1.8s forwards;
  }
  @keyframes constFade { to { opacity: 1; } }

  /* === CROSSES === */
  .cross {
    position: absolute;
    color: var(--gray-cross);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    opacity: 0;
    animation: crossFade 0.6s ease both;
    user-select: none;
    transition: color 0.4s, text-shadow 0.4s, transform 0.3s;
  }
  .cross:hover {
    color: var(--orange);
    text-shadow: 0 0 8px rgba(255,85,0,0.5);
    transform: rotate(45deg) scale(1.3);
  }

  @keyframes crossFade {
    from { opacity: 0; transform: scale(0.5) rotate(45deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* === PLANET === */
  .planet-container {
    position: absolute;
    top: 50%;
    left: 48%;
    transform: translate(-50%, -50%);
    width: min(38vw, 38vh);
    height: min(38vw, 38vh);
    z-index: 3;
    will-change: transform;
  }

  .planet {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(
      circle at 42% 38%,
      #ffaa44 0%,
      var(--orange-bright) 18%,
      var(--orange) 40%,
      #aa3300 65%,
      #551800 82%,
      #220a00 95%,
      transparent 100%
    );
    box-shadow:
      0 0 60px 15px rgba(255, 85, 0, 0.35),
      0 0 140px 50px rgba(255, 85, 0, 0.12),
      0 0 220px 90px rgba(255, 85, 0, 0.06),
      inset -25px -18px 50px rgba(0, 0, 0, 0.55);
    animation: planetPulse 6s ease-in-out infinite, planetIn 1.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    overflow: hidden;
  }

  @keyframes planetPulse {
    0%, 100% { box-shadow: 0 0 60px 15px rgba(255,85,0,0.35), 0 0 140px 50px rgba(255,85,0,0.12), 0 0 220px 90px rgba(255,85,0,0.06), inset -25px -18px 50px rgba(0,0,0,0.55); }
    50% { box-shadow: 0 0 70px 22px rgba(255,85,0,0.4), 0 0 160px 60px rgba(255,85,0,0.15), 0 0 240px 100px rgba(255,85,0,0.08), inset -25px -18px 50px rgba(0,0,0,0.55); }
  }

  @keyframes planetIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Planet storm spot */
  .planet-storm {
    position: absolute;
    width: 22%;
    height: 14%;
    top: 52%;
    left: 30%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(200,60,10,0.5) 0%, rgba(180,50,5,0.25) 50%, transparent 75%);
    filter: blur(3px);
    animation: stormDrift 40s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  .planet-storm-2 {
    position: absolute;
    width: 10%;
    height: 7%;
    top: 35%;
    left: 55%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,180,100,0.2) 0%, transparent 70%);
    filter: blur(2px);
    animation: stormDrift 25s ease-in-out infinite alternate-reverse;
    mix-blend-mode: screen;
  }
  @keyframes stormDrift {
    0% { transform: translateX(0); }
    100% { transform: translateX(15%); }
  }

  /* Planet bands */
  .planet-bands {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    opacity: 0.35;
    mix-blend-mode: overlay;
  }
  .planet-bands::before {
    content: '';
    position: absolute;
    inset: -20%;
    background: repeating-linear-gradient(
      2deg,
      transparent 0px,
      transparent 10px,
      rgba(255,200,120,0.15) 10px,
      rgba(255,200,120,0.15) 13px,
      transparent 13px,
      transparent 22px,
      rgba(180,80,20,0.2) 22px,
      rgba(180,80,20,0.2) 25px,
      transparent 25px,
      transparent 36px,
      rgba(255,220,160,0.1) 36px,
      rgba(255,220,160,0.1) 38px
    );
    animation: bandsScroll 80s linear infinite;
  }
  @keyframes bandsScroll {
    to { transform: translateY(40px); }
  }

  /* Planet atmosphere haze */
  .planet::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 78% 68%, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.3) 28%, transparent 55%),
      radial-gradient(circle at 30% 25%, rgba(255,200,120,0.08) 0%, transparent 40%);
  }

  /* Atmosphere rim */
  .planet-rim {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(255,120,40,0.06);
    box-shadow:
      inset 0 0 30px rgba(255,100,20,0.04),
      0 0 40px rgba(255,100,20,0.03);
    pointer-events: none;
  }

  /* === ORBITING MOON === */
  .moon-orbit {
    position: absolute;
    top: 50%;
    left: 48%;
    width: min(52vw, 52vh);
    height: min(52vw, 52vh);
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
    animation: moonOrbit 30s linear infinite;
  }
  .moon {
    position: absolute;
    top: -2%;
    left: 50%;
    width: clamp(4px, 0.6vw, 8px);
    height: clamp(4px, 0.6vw, 8px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffeedd, #cc9966);
    box-shadow: 0 0 6px rgba(255,200,150,0.5), 0 0 15px rgba(255,150,80,0.15);
    transform: translateX(-50%);
  }
  .moon::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200%;
    height: 200%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,180,120,0.08) 0%, transparent 70%);
  }
  @keyframes moonOrbit {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* === RING SYSTEM === */
  .ring-back {
    position: absolute;
    top: 50%;
    left: 48%;
    transform: translate(-50%, -50%);
    width: min(58vw, 58vh);
    height: min(9vw, 9vh);
    z-index: 2;
    animation: ringIn 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    will-change: transform;
  }
  .ring-front {
    position: absolute;
    top: 50%;
    left: 48%;
    transform: translate(-50%, -50%);
    width: min(58vw, 58vh);
    height: min(9vw, 9vh);
    z-index: 4;
    animation: ringIn 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    will-change: transform;
  }

  @keyframes ringIn {
    from { opacity: 0; transform: translate(-50%, -50%) scaleX(0.4); }
    to { opacity: 1; transform: translate(-50%, -50%) scaleX(1); }
  }

  .ring-back svg, .ring-front svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Ring shimmer overlay */
  .ring-shimmer {
    position: absolute;
    top: 50%;
    left: 48%;
    transform: translate(-50%, -50%);
    width: min(58vw, 58vh);
    height: min(9vw, 9vh);
    z-index: 4;
    pointer-events: none;
    overflow: hidden;
    opacity: 0;
    animation: ringIn 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    will-change: transform;
  }
  .ring-shimmer::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,180,120,0.06), transparent);
    animation: shimmerSweep 8s ease-in-out infinite;
  }
  @keyframes shimmerSweep {
    0%, 100% { left: -50%; }
    50% { left: 100%; }
  }

  /* === DIAGONAL LINE === */
  .diagonal-line {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    animation: lineIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
  }

  @keyframes lineIn {
    from { clip-path: inset(100% 0 0 0); }
    to { clip-path: inset(0 0 0 0); }
  }

  /* === ORBITAL TRAILS === */
  .orbital-trails {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    animation: trailFade 2s ease 0.8s both;
  }
  @keyframes trailFade { from { opacity: 0; } to { opacity: 1; } }

  .orbital-dot {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--orange);
    opacity: 0;
  }
  .orbital-dot.active {
    animation: dotPulse 4s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0; }
    15%, 85% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* === DASHED CURVES === */
  .dashed-curves {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    animation: trailFade 1.5s ease 0.8s both;
  }

  /* === BOXES === */
  .box {
    position: absolute;
    border: 1.5px solid var(--orange);
    z-index: 6;
    animation: boxIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    backdrop-filter: blur(2px);
    background: rgba(6,6,6,0.4);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .box:hover {
    border-color: var(--orange-bright);
    box-shadow: 0 0 20px rgba(255,85,0,0.1), inset 0 0 20px rgba(255,85,0,0.03);
  }

  @keyframes boxIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .box-date {
    top: 13vh;
    left: 5vw;
    padding: clamp(10px, 1.5vw, 18px) clamp(12px, 1.8vw, 20px);
    animation-delay: 0.6s;
  }

  .box-date .weather-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .box-date .temp {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: clamp(24px, 3.5vw, 42px);
    color: var(--white);
    letter-spacing: 2px;
    line-height: 1;
    transition: opacity 0.4s ease;
  }

  .box-date .weather-icon {
    font-size: clamp(16px, 2vw, 26px);
    line-height: 1;
    filter: drop-shadow(0 0 4px rgba(255,85,0,0.3));
    transition: opacity 0.4s ease;
  }

  .box-date .condition {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(7px, 0.7vw, 9px);
    color: var(--orange);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
    transition: opacity 0.4s ease;
  }

  .box-date .time {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(10px, 1.2vw, 15px);
    color: var(--white-dim);
    letter-spacing: 2px;
    margin-top: 6px;
  }
  .box-date .time .seconds {
    color: var(--orange);
    opacity: 0.7;
  }

  .box-date .location {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(6px, 0.55vw, 8px);
    color: rgba(153,153,153,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 5px;
  }

  .box-leggo {
    bottom: 18vh;
    right: 5vw;
    width: clamp(70px, 7vw, 100px);
    height: clamp(90px, 12vh, 130px);
    display: flex;
    align-items: center;
    justify-content: center;
    animation-delay: 0.8s;
  }

  .box-leggo span {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: clamp(14px, 1.5vw, 20px);
    color: var(--white);
    letter-spacing: 5px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
  }

  .box-bottom-left {
    bottom: 13vh;
    left: 5vw;
    padding: 6px 16px;
    animation-delay: 0.9s;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  .box-bottom-left span {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(8px, 0.8vw, 11px);
    color: var(--white-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .box-bottom-left:hover span {
    color: var(--orange);
  }

  /* === COORD LABELS === */
  .coord {
    position: absolute;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(7px, 0.7vw, 10px);
    color: var(--white-dim);
    letter-spacing: 2px;
    z-index: 6;
    opacity: 0;
    animation: textFade 1s ease both;
  }
  .coord-tl { top: 22px; left: 28px; animation-delay: 1.3s; }
  .coord-tr { top: 22px; right: 28px; animation-delay: 1.35s; }
  .coord-bl { bottom: 8vh; left: 28px; animation-delay: 1.4s; }

  /* === TYPOGRAPHY === */
  .text-bunkermuz {
    position: absolute;
    top: 17vh;
    right: 5vw;
    z-index: 6;
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: clamp(12px, 1.4vw, 20px);
    color: var(--white);
    letter-spacing: clamp(8px, 1.2vw, 16px);
    text-transform: uppercase;
    animation: textSlide 1s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
  }

  @keyframes textSlide {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes textFade { from { opacity: 0; } to { opacity: 0.85; } }

  .text-smile {
    position: absolute;
    top: 42vh;
    right: 3.5vw;
    z-index: 6;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: clamp(12px, 1.3vw, 18px);
    color: var(--white);
    letter-spacing: 7px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    animation: textFade 1s ease 1s both;
  }

  /* TITLE */
  .text-saturnday {
    position: absolute;
    bottom: 3vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    display: flex;
    align-items: center;
    gap: 0;
    animation: titleIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.1s both;
  }

  @keyframes titleIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .text-saturnday span {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: clamp(12px, 1.3vw, 18px);
    color: var(--white);
    letter-spacing: 5px;
    border: 1.5px solid var(--orange);
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,96,28,0.04);
    transition: background 0.4s, box-shadow 0.4s;
  }
  .text-saturnday:hover span {
    background: rgba(232,96,28,0.08);
    box-shadow: 0 0 30px rgba(255,85,0,0.08);
  }

  .saturn-icon {
    display: inline-block;
    width: 16px;
    height: 16px;
    position: relative;
  }
  .saturn-icon::before {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--orange);
  }
  .saturn-icon::after {
    content: '';
    position: absolute;
    top: 5px; left: -2px;
    width: 20px; height: 7px;
    border: 1.2px solid var(--orange);
    border-radius: 50%;
    background: transparent;
  }

  /* === EDITION TAG === */
  .edition-tag {
    position: absolute;
    top: 4.5vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(8px, 0.8vw, 11px);
    color: var(--orange);
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0;
    animation: textFade 1s ease 1.2s both;
  }

  /* === FLOATING PARTICLES === */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) translateX(0); }
    10% { opacity: var(--p-o, 0.3); }
    90% { opacity: var(--p-o, 0.3); }
    100% { opacity: 0; transform: translateY(-120px) translateX(var(--p-drift, 10px)); }
  }

  /* === SCAN LINES === */
  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 9;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.03) 3px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* === NOISE === */
  .noise {
    position: absolute;
    inset: 0;
    z-index: 10;
    opacity: 0.025;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  /* === VIGNETTE === */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 8;
    pointer-events: none;
    background: radial-gradient(ellipse 65% 60% at 48% 48%, transparent 40%, rgba(0,0,0,0.5) 100%);
  }

  /* === CORNER MARKS === */
  .corner-mark {
    position: absolute;
    width: 16px;
    height: 16px;
    z-index: 7;
    opacity: 0;
    animation: textFade 1s ease 1.4s both;
  }
  .corner-mark::before, .corner-mark::after {
    content: '';
    position: absolute;
    background: var(--orange);
    opacity: 0.3;
  }
  .corner-mark.tl { top: 12px; left: 12px; }
  .corner-mark.tl::before { width: 12px; height: 1px; top: 0; left: 0; }
  .corner-mark.tl::after { width: 1px; height: 12px; top: 0; left: 0; }
  .corner-mark.tr { top: 12px; right: 12px; }
  .corner-mark.tr::before { width: 12px; height: 1px; top: 0; right: 0; }
  .corner-mark.tr::after { width: 1px; height: 12px; top: 0; right: 0; }
  .corner-mark.bl { bottom: 12px; left: 12px; }
  .corner-mark.bl::before { width: 12px; height: 1px; bottom: 0; left: 0; }
  .corner-mark.bl::after { width: 1px; height: 12px; bottom: 0; left: 0; }
  .corner-mark.br { bottom: 12px; right: 12px; }
  .corner-mark.br::before { width: 12px; height: 1px; bottom: 0; right: 0; }
  .corner-mark.br::after { width: 1px; height: 12px; bottom: 0; right: 0; }

  /* === HUD PULSE LINE === */
  .hud-pulse {
    position: absolute;
    bottom: 9vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    width: clamp(100px, 12vw, 160px);
    height: 20px;
    opacity: 0;
    animation: textFade 1s ease 1.5s both;
  }
  .hud-pulse svg { width: 100%; height: 100%; }
  .hud-pulse-line {
    stroke: var(--orange);
    stroke-width: 1;
    fill: none;
    opacity: 0.4;
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: hudDraw 3s ease-in-out infinite;
  }
  @keyframes hudDraw {
    0% { stroke-dashoffset: 200; opacity: 0.2; }
    50% { stroke-dashoffset: 0; opacity: 0.5; }
    100% { stroke-dashoffset: -200; opacity: 0.2; }
  }
</style>
</head>
<body>

<!-- Loading curtain -->
<div class="loading-curtain" id="loading">
  <div class="loader-ring"></div>
</div>

<div class="poster" id="poster">

  <div class="bg-atmosphere"></div>

  <!-- Cursor glow -->
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- Constellation canvas -->
  <canvas class="constellation-canvas" id="constellationCanvas"></canvas>

  <!-- Orbital trails (SVG) -->
  <div class="orbital-trails">
    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="475" cy="500" rx="400" ry="220"
        fill="none" stroke="#e8601c" stroke-width="0.5"
        stroke-dasharray="3 8" opacity="0.15"
        transform="rotate(-12 475 500)"/>
      <ellipse cx="475" cy="500" rx="480" ry="260"
        fill="none" stroke="#e8601c" stroke-width="0.4"
        stroke-dasharray="2 12" opacity="0.08"
        transform="rotate(-12 475 500)"/>
    </svg>
  </div>

  <!-- Dashed curves -->
  <div class="dashed-curves">
    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <path d="M 480 75 Q 620 50 720 70 Q 830 90 900 60"
        fill="none" stroke="#e8601c" stroke-width="1.2"
        stroke-dasharray="8 6" opacity="0.6"/>
      <path d="M 70 880 Q 170 855 260 865 Q 340 875 430 855"
        fill="none" stroke="#666" stroke-width="0.8"
        stroke-dasharray="5 5" opacity="0.35"/>
      <path d="M 690 930 Q 760 915 810 922 Q 880 930 930 912"
        fill="none" stroke="#555" stroke-width="0.6"
        stroke-dasharray="4 6" opacity="0.25"/>
    </svg>
  </div>

  <!-- Ring BACK (behind planet) -->
  <div class="ring-back">
    <svg viewBox="0 0 460 70" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="ring-back-clip">
          <rect x="0" y="0" width="460" height="35"/>
        </clipPath>
        <linearGradient id="ringGradBack" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#e8601c" stop-opacity="0.15"/>
          <stop offset="30%" stop-color="#e8601c" stop-opacity="0.45"/>
          <stop offset="50%" stop-color="#ffaa66" stop-opacity="0.5"/>
          <stop offset="70%" stop-color="#e8601c" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#e8601c" stop-opacity="0.15"/>
        </linearGradient>
      </defs>
      <g clip-path="url(#ring-back-clip)">
        <ellipse cx="230" cy="35" rx="228" ry="32"
          fill="none" stroke="url(#ringGradBack)" stroke-width="1.2" opacity="0.4"/>
        <ellipse cx="230" cy="35" rx="215" ry="28"
          fill="none" stroke="url(#ringGradBack)" stroke-width="0.6" opacity="0.2"/>
        <ellipse cx="230" cy="35" rx="205" ry="25"
          fill="none" stroke="#e8601c" stroke-width="0.4" opacity="0.12"/>
      </g>
    </svg>
  </div>

  <!-- Planet -->
  <div class="planet-container">
    <div class="planet">
      <div class="planet-bands"></div>
      <div class="planet-storm"></div>
      <div class="planet-storm-2"></div>
    </div>
    <div class="planet-rim"></div>
  </div>

  <!-- Orbiting moon -->
  <div class="moon-orbit">
    <div class="moon"></div>
  </div>

  <!-- Ring FRONT (in front of planet) -->
  <div class="ring-front">
    <svg viewBox="0 0 460 70" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="ring-front-clip">
          <rect x="0" y="35" width="460" height="35"/>
        </clipPath>
        <linearGradient id="ringGradFront" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#e8601c" stop-opacity="0.3"/>
          <stop offset="25%" stop-color="#e8601c" stop-opacity="0.9"/>
          <stop offset="50%" stop-color="#ffaa66" stop-opacity="1"/>
          <stop offset="75%" stop-color="#e8601c" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#e8601c" stop-opacity="0.3"/>
        </linearGradient>
      </defs>
      <g clip-path="url(#ring-front-clip)">
        <ellipse cx="230" cy="35" rx="228" ry="32"
          fill="none" stroke="url(#ringGradFront)" stroke-width="1.5" opacity="0.85"/>
        <ellipse cx="230" cy="35" rx="215" ry="28"
          fill="none" stroke="url(#ringGradFront)" stroke-width="0.8" opacity="0.4"/>
        <ellipse cx="230" cy="35" rx="205" ry="25"
          fill="none" stroke="#e8601c" stroke-width="0.5" opacity="0.2"/>
      </g>
    </svg>
  </div>

  <!-- Ring shimmer -->
  <div class="ring-shimmer"></div>

  <!-- Diagonal line -->
  <div class="diagonal-line">
    <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e8601c" stop-opacity="0.3"/>
          <stop offset="30%" stop-color="#e8601c" stop-opacity="1"/>
          <stop offset="70%" stop-color="#e8601c" stop-opacity="1"/>
          <stop offset="100%" stop-color="#e8601c" stop-opacity="0.3"/>
        </linearGradient>
      </defs>
      <line x1="580" y1="-20" x2="380" y2="1020"
        stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Corner marks -->
  <div class="corner-mark tl"></div>
  <div class="corner-mark tr"></div>
  <div class="corner-mark bl"></div>
  <div class="corner-mark br"></div>

  <!-- Boxes -->
  <div class="box box-date">
    <div class="weather-row">
      <span class="temp" id="ensenada-temp">--°C</span>
      <span class="weather-icon" id="ensenada-icon">◌</span>
    </div>
    <div class="condition" id="ensenada-condition">LOADING...</div>
    <div class="time" id="ensenada-time">--:--:--</div>
    <div class="location">ENSENADA B.C.</div>
  </div>

  <div class="box box-leggo">
    <span>/ZU</span>
  </div>

  <a href="https://zoleole.github.io/tormenta-y-huracat" target="_blank" style="text-decoration:none;">
    <div class="box box-bottom-left">
        <span>TORMENTA Y HURACAT</span>
    </div>
  </a>

  <!-- Edition tag -->
  <div class="edition-tag">XII</div>

  <!-- Typography -->
  <div class="text-bunkermuz">Z O L E O L E</div>
  <div class="text-smile">2 0 2 6</div>

  <!-- Coordinates -->
  <div class="coord coord-tl">31.8667°N</div>
  <div class="coord coord-tr">116.6000°W</div>
  <div class="coord coord-bl">@ZPOTNYK</div>

  <div class="text-saturnday">
    <span>DRA <span class="saturn-icon"></span> ATMOSFERA</span>
  </div>

  <!-- HUD pulse -->
  <div class="hud-pulse">
    <svg viewBox="0 0 160 20" xmlns="http://www.w3.org/2000/svg">
      <polyline class="hud-pulse-line" points="0,10 30,10 40,3 50,17 60,5 70,15 80,8 90,12 100,10 160,10"/>
    </svg>
  </div>

  <!-- Scanlines -->
  <div class="scanlines"></div>
  <!-- Vignette -->
  <div class="vignette"></div>
  <!-- Noise -->
  <div class="noise"></div>
</div>

<script>
  const poster = document.getElementById('poster');

  // === LOADING SEQUENCE ===
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('loading').classList.add('hide');
    }, 800);
  });

  // === STARFIELD ===
  const stars = [];
  const starCount = 160;
  for (let i = 0; i < starCount; i++) {
    const star = document.createElement('div');
    star.className = 'star' + (Math.random() > 0.6 ? ' twinkle' : '');
    const size = Math.random() < 0.85 ? (0.8 + Math.random() * 0.8) : (1.5 + Math.random() * 1);
    const opacity = 0.15 + Math.random() * 0.45;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    star.style.cssText = `
      left: ${x}%;
      top: ${y}%;
      width: ${size}px;
      height: ${size}px;
      --star-o: ${opacity};
      animation-delay: ${0.2 + Math.random() * 1.2}s${star.classList.contains('twinkle') ? ', ' + (Math.random() * 3).toFixed(1) + 's' : ''};
    `;
    poster.appendChild(star);
    stars.push({ el: star, x, y, size });
  }

  // === CONSTELLATION LINES ===
  const constCanvas = document.getElementById('constellationCanvas');
  const constCtx = constCanvas.getContext('2d');

  function resizeConstCanvas() {
    constCanvas.width = window.innerWidth;
    constCanvas.height = window.innerHeight;
  }
  resizeConstCanvas();
  window.addEventListener('resize', resizeConstCanvas);

  function drawConstellations() {
    constCtx.clearRect(0, 0, constCanvas.width, constCanvas.height);
    const w = constCanvas.width;
    const h = constCanvas.height;

    // Pick nearby star pairs and draw faint lines
    const constellationGroups = [
      // Top-left cluster
      [[8,3],[15,18],[6,35]],
      // Top-right
      [[92,2],[88,20],[72,14]],
      // Middle
      [[48,28],[40,55],[55,62]],
      // Bottom
      [[30,75],[20,92],[42,95]],
      // Right side
      [[85,38],[90,55],[78,65]],
    ];

    constCtx.strokeStyle = 'rgba(232, 96, 28, 0.06)';
    constCtx.lineWidth = 0.5;

    constellationGroups.forEach(group => {
      constCtx.beginPath();
      group.forEach((pt, i) => {
        const px = (pt[0] / 100) * w;
        const py = (pt[1] / 100) * h;
        if (i === 0) constCtx.moveTo(px, py);
        else constCtx.lineTo(px, py);
      });
      constCtx.stroke();
    });
  }
  setTimeout(drawConstellations, 2000);
  window.addEventListener('resize', () => setTimeout(drawConstellations, 100));

  // === CROSSES ===
  const crossPositions = [
    [8,3],[92,2],[15,18],[72,14],[88,20],
    [6,35],[48,28],[85,38],[22,50],[68,45],
    [40,55],[90,55],[12,68],[55,62],[78,65],
    [30,75],[60,72],[8,82],[50,85],[75,80],
    [20,92],[88,88],[42,95],[65,92],[35,38],
    [95,45],[5,55],[82,75],[3,12],[97,68],
    [50,8],[15,95],[96,15],[62,3],[38,97],
    [2,48],[98,32],[25,6],[78,96],[45,15]
  ];
  crossPositions.forEach(([x, y], i) => {
    const cross = document.createElement('div');
    cross.className = 'cross';
    cross.textContent = '+';
    cross.style.left = x + '%';
    cross.style.top = y + '%';
    cross.style.animationDelay = (0.3 + i * 0.04) + 's';
    const scale = 0.7 + Math.random() * 0.6;
    cross.style.fontSize = (11 * scale) + 'px';
    cross.style.opacity = 0.2 + Math.random() * 0.4;
    poster.appendChild(cross);
  });

  // === FLOATING PARTICLES ===
  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 1 + Math.random() * 2;
    const x = 30 + Math.random() * 40;
    const y = 35 + Math.random() * 30;
    const dur = 6 + Math.random() * 8;
    const drift = -15 + Math.random() * 30;
    const opacity = 0.1 + Math.random() * 0.25;
    const isOrange = Math.random() > 0.5;
    p.style.cssText = `
      left: ${x}%;
      top: ${y}%;
      width: ${size}px;
      height: ${size}px;
      background: ${isOrange ? 'rgba(255,100,30,' + opacity + ')' : 'rgba(255,255,255,' + (opacity * 0.6) + ')'};
      --p-o: ${opacity};
      --p-drift: ${drift}px;
      animation-duration: ${dur}s;
    `;
    poster.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000);
  }
  for (let i = 0; i < 16; i++) setTimeout(spawnParticle, i * 250);
  setInterval(spawnParticle, 600);

  // === SHOOTING STARS ===
  function spawnShootingStar() {
    const ss = document.createElement('div');
    ss.className = 'shooting-star';

    const startX = 15 + Math.random() * 70;
    const startY = Math.random() * 40;
    const angle = 20 + Math.random() * 30; // degrees
    const distance = 150 + Math.random() * 250;
    const rad = angle * (Math.PI / 180);
    const dx = Math.cos(rad) * distance;
    const dy = Math.sin(rad) * distance;
    const trailLen = 40 + Math.random() * 50;
    const trailAngle = -(180 - angle);
    const dur = 0.5 + Math.random() * 0.6;

    ss.style.cssText = `
      left: ${startX}%;
      top: ${startY}%;
      --shoot-dx: ${dx}px;
      --shoot-dy: ${dy}px;
      --trail-len: ${trailLen}px;
      --trail-angle: ${trailAngle}deg;
      animation: shootingStar ${dur}s ease-out forwards;
    `;
    poster.appendChild(ss);
    setTimeout(() => ss.remove(), dur * 1000 + 100);
  }

  // Random shooting stars
  function scheduleShootingStar() {
    const delay = 3000 + Math.random() * 8000;
    setTimeout(() => {
      spawnShootingStar();
      scheduleShootingStar();
    }, delay);
  }
  setTimeout(scheduleShootingStar, 2000);

  // === LIVE ENSENADA TIME ===
  function updateEnsenadaTime() {
    const now = new Date();
    const ensenada = new Date(now.toLocaleString('en-US', { timeZone: 'America/Tijuana' }));
    const h = String(ensenada.getHours()).padStart(2, '0');
    const m = String(ensenada.getMinutes()).padStart(2, '0');
    const s = String(ensenada.getSeconds()).padStart(2, '0');
    document.getElementById('ensenada-time').innerHTML = h + ':' + m + ':<span class="seconds">' + s + '</span>';
  }
  updateEnsenadaTime();
  setInterval(updateEnsenadaTime, 1000);

  // === LIVE ENSENADA WEATHER (Open-Meteo — free, no API key) ===
  const WMO_CODES = {
    0: ['CLEAR SKY', '☀', '☽'],
    1: ['MOSTLY CLEAR', '🌤', '☽'],
    2: ['PARTLY CLOUDY', '⛅', '☁'],
    3: ['OVERCAST', '☁', '☁'],
    45: ['FOG', '🌫', '🌫'],
    48: ['RIME FOG', '🌫', '🌫'],
    51: ['LIGHT DRIZZLE', '🌦', '🌧'],
    53: ['DRIZZLE', '🌦', '🌧'],
    55: ['HEAVY DRIZZLE', '🌧', '🌧'],
    61: ['LIGHT RAIN', '🌦', '🌧'],
    63: ['RAIN', '🌧', '🌧'],
    65: ['HEAVY RAIN', '🌧', '🌧'],
    71: ['LIGHT SNOW', '🌨', '🌨'],
    73: ['SNOW', '❄', '❄'],
    75: ['HEAVY SNOW', '❄', '❄'],
    80: ['RAIN SHOWERS', '🌦', '🌧'],
    81: ['MODERATE SHOWERS', '🌧', '🌧'],
    82: ['VIOLENT SHOWERS', '⛈', '⛈'],
    95: ['THUNDERSTORM', '⛈', '⛈'],
    96: ['STORM W/ HAIL', '⛈', '⛈'],
    99: ['STORM W/ HAIL', '⛈', '⛈'],
  };

  async function fetchEnsenadaWeather() {
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=31.8667&longitude=-116.5964&current=temperature_2m,weather_code,is_day&timezone=America%2FTijuana';
      const res = await fetch(url);
      const data = await res.json();

      const temp = Math.round(data.current.temperature_2m);
      const code = data.current.weather_code;
      const isDay = data.current.is_day === 1;

      const info = WMO_CODES[code] || WMO_CODES[0];
      const condition = info[0];
      const icon = isDay ? info[1] : info[2];

      document.getElementById('ensenada-temp').textContent = temp + '°C';
      document.getElementById('ensenada-icon').textContent = icon;
      document.getElementById('ensenada-condition').textContent = condition;
    } catch (err) {
      document.getElementById('ensenada-temp').textContent = '--°C';
      document.getElementById('ensenada-condition').textContent = 'OFFLINE';
      console.error('Weather fetch error:', err);
    }
  }

  fetchEnsenadaWeather();
  setInterval(fetchEnsenadaWeather, 10 * 60 * 1000);

  // === SMOOTH PARALLAX (rAF-based) ===
  let mouseX = 0, mouseY = 0;
  let currentX = 0, currentY = 0;

  const planet = document.querySelector('.planet-container');
  const ringBack = document.querySelector('.ring-back');
  const ringFront = document.querySelector('.ring-front');
  const ringShimmer = document.querySelector('.ring-shimmer');
  const moonOrbit = document.querySelector('.moon-orbit');
  const cursorGlow = document.getElementById('cursorGlow');

  poster.addEventListener('mousemove', (e) => {
    const rect = poster.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) / rect.width - 0.5;
    mouseY = (e.clientY - rect.top) / rect.height - 0.5;

    // Cursor glow follows immediately
    cursorGlow.style.left = e.clientX + 'px';
    cursorGlow.style.top = e.clientY + 'px';
  });

  // Lerp for silky parallax
  function parallaxLoop() {
    const ease = 0.06;
    currentX += (mouseX - currentX) * ease;
    currentY += (mouseY - currentY) * ease;

    const px = currentX * 15;
    const py = currentY * 15;
    const rx = currentX * 20;
    const ry = currentY * 8;

    planet.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
    ringBack.style.transform = `translate(calc(-50% + ${rx}px), calc(-50% + ${ry}px))`;
    ringFront.style.transform = `translate(calc(-50% + ${rx}px), calc(-50% + ${ry}px))`;
    ringShimmer.style.transform = `translate(calc(-50% + ${rx}px), calc(-50% + ${ry}px))`;
    moonOrbit.style.marginLeft = (currentX * 10) + 'px';
    moonOrbit.style.marginTop = (currentY * 10) + 'px';

    requestAnimationFrame(parallaxLoop);
  }
  parallaxLoop();

  // === MOBILE GYROSCOPE PARALLAX ===
  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', (e) => {
      if (e.gamma !== null && e.beta !== null) {
        mouseX = Math.max(-0.5, Math.min(0.5, e.gamma / 40));
        mouseY = Math.max(-0.5, Math.min(0.5, (e.beta - 40) / 40));
      }
    });
  }
</script>

</body>
</html>

<head>

  <!-- Canonical -->

  <!-- Favicons -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">

  <!-- PWA manifest -->
  <link rel="manifest" href="./manifest.webmanifest">

  <!-- Performance: preconnect to external origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@200;300;400;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Loading curtain -->
  <div class="loading-curtain" id="loading">
    <div class="loader-ring"></div>
  </div>

  <div class="poster" id="poster">

    <div class="bg-atmosphere"></div>

    <!-- Cursor glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Constellation canvas -->
    <canvas class="constellation-canvas" id="constellationCanvas"></canvas>

    <!-- Orbital trails (SVG) -->
    <div class="orbital-trails">
      <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1000 1000"
        xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="475" cy="500" rx="400" ry="220" fill="none" stroke="#e8601c" stroke-width="0.5"
          stroke-dasharray="3 8" opacity="0.15" transform="rotate(-12 475 500)" />
        <ellipse cx="475" cy="500" rx="480" ry="260" fill="none" stroke="#e8601c" stroke-width="0.4"
          stroke-dasharray="2 12" opacity="0.08" transform="rotate(-12 475 500)" />
      </svg>
    </div>

    <!-- Dashed curves -->
    <div class="dashed-curves">
      <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1000 1000"
        xmlns="http://www.w3.org/2000/svg">
        <path d="M 480 75 Q 620 50 720 70 Q 830 90 900 60" fill="none" stroke="#e8601c" stroke-width="1.2"
          stroke-dasharray="8 6" opacity="0.6" />
        <path d="M 70 880 Q 170 855 260 865 Q 340 875 430 855" fill="none" stroke="#666" stroke-width="0.8"
          stroke-dasharray="5 5" opacity="0.35" />
        <path d="M 690 930 Q 760 915 810 922 Q 880 930 930 912" fill="none" stroke="#555" stroke-width="0.6"
          stroke-dasharray="4 6" opacity="0.25" />
      </svg>
    </div>

    <!-- Ring BACK (behind planet) -->
    <div class="ring-back">
      <svg viewBox="0 0 460 70" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="ring-back-clip">
            <rect x="0" y="0" width="460" height="35" />
          </clipPath>
          <linearGradient id="ringGradBack" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#e8601c" stop-opacity="0.15" />
            <stop offset="30%" stop-color="#e8601c" stop-opacity="0.45" />
            <stop offset="50%" stop-color="#ffaa66" stop-opacity="0.5" />
            <stop offset="70%" stop-color="#e8601c" stop-opacity="0.45" />
            <stop offset="100%" stop-color="#e8601c" stop-opacity="0.15" />
          </linearGradient>
        </defs>
        <g clip-path="url(#ring-back-clip)">
          <ellipse cx="230" cy="35" rx="228" ry="32" fill="none" stroke="url(#ringGradBack)" stroke-width="1.2"
            opacity="0.4" />
          <ellipse cx="230" cy="35" rx="215" ry="28" fill="none" stroke="url(#ringGradBack)" stroke-width="0.6"
            opacity="0.2" />
          <ellipse cx="230" cy="35" rx="205" ry="25" fill="none" stroke="#e8601c" stroke-width="0.4" opacity="0.12" />
        </g>
      </svg>
    </div>

    <!-- Planet -->
    <div class="planet-container">
      <div class="planet">
        <div class="planet-bands"></div>
        <div class="planet-storm"></div>
        <div class="planet-storm-2"></div>
      </div>
      <div class="planet-rim"></div>
    </div>

    <!-- Orbiting moon -->
    <div class="moon-orbit">
      <div class="moon"></div>
    </div>

    <!-- Ring FRONT (in front of planet) -->
    <div class="ring-front">
      <svg viewBox="0 0 460 70" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="ring-front-clip">
            <rect x="0" y="35" width="460" height="35" />
          </clipPath>
          <linearGradient id="ringGradFront" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#e8601c" stop-opacity="0.3" />
            <stop offset="25%" stop-color="#e8601c" stop-opacity="0.9" />
            <stop offset="50%" stop-color="#ffaa66" stop-opacity="1" />
            <stop offset="75%" stop-color="#e8601c" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#e8601c" stop-opacity="0.3" />
          </linearGradient>
        </defs>
        <g clip-path="url(#ring-front-clip)">
          <ellipse cx="230" cy="35" rx="228" ry="32" fill="none" stroke="url(#ringGradFront)" stroke-width="1.5"
            opacity="0.85" />
          <ellipse cx="230" cy="35" rx="215" ry="28" fill="none" stroke="url(#ringGradFront)" stroke-width="0.8"
            opacity="0.4" />
          <ellipse cx="230" cy="35" rx="205" ry="25" fill="none" stroke="#e8601c" stroke-width="0.5" opacity="0.2" />
        </g>
      </svg>
    </div>

    <!-- Ring shimmer -->
    <div class="ring-shimmer"></div>

    <!-- Diagonal line -->
    <div class="diagonal-line">
      <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1000 1000"
        xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e8601c" stop-opacity="0.3" />
            <stop offset="30%" stop-color="#e8601c" stop-opacity="1" />
            <stop offset="70%" stop-color="#e8601c" stop-opacity="1" />
            <stop offset="100%" stop-color="#e8601c" stop-opacity="0.3" />
          </linearGradient>
        </defs>
        <line x1="580" y1="-20" x2="380" y2="1020" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" />
      </svg>
    </div>

    <!-- Corner marks -->
    <div class="corner-mark tl"></div>
    <div class="corner-mark tr"></div>
    <div class="corner-mark bl"></div>
    <div class="corner-mark br"></div>

    <!-- Boxes -->
    <div class="box box-date">
      <div class="weather-row">
        <span class="temp" id="ensenada-temp">--°C</span>
        <span class="weather-icon" id="ensenada-icon">◌</span>
      </div>
      <div class="condition" id="ensenada-condition">LOADING...</div>
      <div class="time" id="ensenada-time">--:--:--</div>
      <div class="location">ENSENADA B.C.</div>
    </div>

    <a href="https://www.linkedin.com/in/zuleica-ojeda-lerma-6ab599179" target="_blank" style="text-decoration:none;">
      <div class="box box-leggo">
        <span>/ZU</span>
      </div>
    </a>

    <a href="https://zoleole.github.io/tormenta-y-huracat" style="text-decoration:none;">
      <div class="box box-bottom-left">
        <span>TORMENTA Y HURACAT</span>
      </div>
    </a>

    <!-- Edition tag -->
    <div class="edition-tag">XII</div>

    <!-- Typography -->
    <div class="text-bunkermuz">Z O L E O L E</div>
    <div class="text-smile">2 0 2 6</div>

    <!-- Coordinates -->
    <div class="coord coord-tl">31.8667°N</div>
    <div class="coord coord-tr">116.6000°W</div>
    <div class="coord coord-bl">@ZPOTNYK</div>

    <a href="https://www.instagram.com/dra.atmosfera/" target="_blank" style="text-decoration:none;">
      <div class="text-saturnday">
        <span>DRA <span class="saturn-icon"></span> ATMOSFERA</span>
      </div>
    </a>

    <!-- HUD pulse -->
    <div class="hud-pulse">
      <svg viewBox="0 0 160 20" xmlns="http://www.w3.org/2000/svg">
        <polyline class="hud-pulse-line" points="0,10 30,10 40,3 50,17 60,5 70,15 80,8 90,12 100,10 160,10" />
      </svg>
    </div>

    <!-- Scanlines -->
    <div class="scanlines"></div>
    <!-- Vignette -->
    <div class="vignette"></div>
    <!-- Noise -->
    <div class="noise"></div>
  </div>

  <script src="main.js" defer></script>

</body>

</html>

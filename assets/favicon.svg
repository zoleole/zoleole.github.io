<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="pg" cx="0.4" cy="0.38">
      <stop offset="0%" stop-color="#ffaa44"/>
      <stop offset="25%" stop-color="#ff6a1a"/>
      <stop offset="55%" stop-color="#e8601c"/>
      <stop offset="80%" stop-color="#aa3300"/>
      <stop offset="100%" stop-color="#441400"/>
    </radialGradient>
    <clipPath id="backClip">
      <rect x="0" y="0" width="32" height="16"/>
    </clipPath>
    <clipPath id="frontClip">
      <rect x="0" y="16" width="32" height="16"/>
    </clipPath>
  </defs>
  <rect width="32" height="32" rx="4" fill="#0c0c0c"/>
  <!-- Ring back -->
  <ellipse cx="16" cy="16" rx="14.5" ry="5" fill="none" stroke="#e8601c" stroke-width="1.3" opacity="0.35" transform="rotate(-12 16 16)" clip-path="url(#backClip)"/>
  <ellipse cx="16" cy="16" rx="12.5" ry="4" fill="none" stroke="#e8601c" stroke-width="0.7" opacity="0.2" transform="rotate(-12 16 16)" clip-path="url(#backClip)"/>
  <!-- Planet -->
  <circle cx="15" cy="15.5" r="7.5" fill="url(#pg)"/>
  <circle cx="15" cy="15.5" r="9" fill="none" stroke="rgba(255,85,0,0.12)" stroke-width="1.5"/>
  <!-- Ring front -->
  <ellipse cx="16" cy="16" rx="14.5" ry="5" fill="none" stroke="#e8601c" stroke-width="1.5" opacity="0.85" transform="rotate(-12 16 16)" clip-path="url(#frontClip)"/>
  <ellipse cx="16" cy="16" rx="12.5" ry="4" fill="none" stroke="#e8601c" stroke-width="0.8" opacity="0.4" transform="rotate(-12 16 16)" clip-path="url(#frontClip)"/>
</svg>

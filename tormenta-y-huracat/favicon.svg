<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff0066"/>
      <stop offset="50%" stop-color="#3a3897"/>
      <stop offset="100%" stop-color="#00e5cc"/>
    </linearGradient>
    <linearGradient id="paw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffccdd" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <circle cx="16" cy="16" r="12" fill="rgba(255,255,255,0.06)"/>
  <!-- Paw print - main pad -->
  <ellipse cx="16" cy="19" rx="5.5" ry="5" fill="url(#paw)"/>
  <!-- Paw toes -->
  <ellipse cx="10.5" cy="12.5" rx="3" ry="3.2" fill="url(#paw)" transform="rotate(-15 10.5 12.5)"/>
  <ellipse cx="16" cy="10.5" rx="3" ry="3.2" fill="url(#paw)"/>
  <ellipse cx="21.5" cy="12.5" rx="3" ry="3.2" fill="url(#paw)" transform="rotate(15 21.5 12.5)"/>
</svg>
